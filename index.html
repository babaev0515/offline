<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>offline — 7А класс</title>
    
    <!-- Только иконки Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* МАКСИМАЛЬНЫЙ МИНИМАЛИЗМ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.3;
        }
        
        /* Шапка */
        .header {
            background: white;
            border-bottom: 1px solid #e5e5e5;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.3px;
            user-select: none;
            cursor: default;
        }
        
        .logo span {
            font-weight: 400;
            color: #666;
        }
        
        .tabs {
            display: flex;
            gap: 24px;
        }
        
        .tab {
            background: none;
            border: none;
            font-size: 16px;
            color: #999;
            cursor: pointer;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.1s;
        }
        
        .tab.active {
            color: #000;
            border-bottom-color: #000;
        }
        
        /* Таймер до каникул */
        .timer {
            background: #f5f5f5;
            padding: 6px 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 0;
            width: 100%;
            justify-content: center;
            border-bottom: 1px solid #e5e5e5;
        }
        
        .timer i {
            color: #000;
            font-size: 14px;
        }
        
        .timer span {
            font-weight: 500;
        }
        
        .timer .days {
            background: #000;
            color: white;
            padding: 2px 8px;
            margin-left: 4px;
        }
        
        /* Основной контент */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 80px;
        }
        
        /* СКЕЛЕТОНЫ */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        .skeleton {
            background: #f0f0f0;
            border-radius: 0;
            margin-bottom: 12px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .skeleton-title {
            height: 20px;
            width: 40%;
            background: #e0e0e0;
            margin-bottom: 8px;
        }
        
        .skeleton-image {
            height: 200px;
            width: 100%;
            background: #e0e0e0;
            margin-bottom: 8px;
        }
        
        .skeleton-text {
            height: 16px;
            width: 100%;
            background: #e0e0e0;
            margin-bottom: 6px;
        }
        
        /* Карточки постов (главная) */
        .post {
            background: white;
            border: 1px solid #f0f0f0;
            padding: 0 0 16px 0;
            margin-bottom: 20px;
            position: relative;
        }
        
        .post.pinned {
            border-left: 3px solid #000;
        }
        
        .post-header {
            padding: 14px 16px;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .post-title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .pin-icon {
            color: #000;
            font-size: 14px;
        }
        
        .post-title {
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #333;
        }
        
        .post-actions {
            display: flex;
            gap: 8px;
        }
        
        .post-action-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            transition: color 0.1s;
            opacity: 0.7;
        }
        
        .post-action-btn:hover {
            opacity: 1;
        }
        
        .post-action-btn.pin:hover {
            color: #000;
        }
        
        .post-action-btn.pin.active {
            color: #000;
            opacity: 1;
        }
        
        .post-action-btn.edit:hover {
            color: #007aff;
        }
        
        .post-action-btn.delete:hover {
            color: #ff3b30;
        }
        
        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: #fafafa;
            display: block;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: opacity 0.1s;
        }
        
        .post-image:hover {
            opacity: 0.9;
        }
        
        .post-content {
            font-size: 15px;
            color: #1d1d1f;
            padding: 12px 16px 0;
        }
        
        .post-footer {
            padding: 12px 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #f5f5f5;
            margin-top: 12px;
        }
        
        .post-stats {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .like-button {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 0;
            color: #999;
            transition: color 0.1s;
            font-size: 14px;
        }
        
        .like-button i {
            font-size: 16px;
        }
        
        .like-button.liked {
            color: #ff3b30;
        }
        
        .like-button.liked i {
            font-weight: 900;
        }
        
        .views-count {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #999;
            font-size: 14px;
        }
        
        .views-count i {
            font-size: 16px;
        }
        
        .post-date {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
        }
        
        /* КОММЕНТАРИИ */
        .comments-section {
            margin-top: 16px;
            padding: 0 16px;
        }
        
        .comments-toggle {
            background: none;
            border: none;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #f0f0f0;
            width: 100%;
        }
        
        .comments-toggle i {
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        .comments-toggle.open i {
            transform: rotate(90deg);
        }
        
        .comments-list {
            margin-top: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .comments-list.open {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .comment {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            padding: 8px;
            background: #fafafa;
            border-radius: 0;
        }
        
        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .comment-content {
            flex: 1;
        }
        
        .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .comment-author {
            font-weight: 600;
            font-size: 13px;
        }
        
        .comment-time {
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
        }
        
        .comment-text {
            font-size: 13px;
            word-break: break-word;
        }
        
        .comment-delete {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            opacity: 0;
            transition: opacity 0.1s;
        }
        
        .comment:hover .comment-delete {
            opacity: 1;
        }
        
        .comment-delete:hover {
            color: #ff3b30;
        }
        
        /* Форма добавления комментария */
        .comment-form {
            margin-top: 12px;
        }
        
        .comment-user-info {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        .comment-user-name {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            font-size: 13px;
            background: white;
            border-radius: 0;
        }
        
        .comment-avatar-upload {
            position: relative;
        }
        
        .comment-avatar-btn {
            background: none;
            border: 1px solid #ddd;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #666;
            font-size: 16px;
            overflow: hidden;
            padding: 0;
        }
        
        .comment-avatar-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .comment-avatar-btn i {
            font-size: 18px;
        }
        
        #commentAvatarInput {
            display: none;
        }
        
        .comment-input-wrapper {
            display: flex;
            gap: 8px;
        }
        
        .comment-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            font-size: 13px;
            background: white;
            border-radius: 0;
        }
        
        .comment-submit {
            background: black;
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 0;
        }
        
        .comment-submit:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Список файлов ВПР и ДЗ (полезно) */
        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin: 24px 0 12px;
            letter-spacing: -0.2px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            font-size: 18px;
            color: #000;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }

        /* Карточка домашнего задания */
        .hw-item {
            background: white;
            border: 1px solid #f0f0f0;
            margin-bottom: 20px;
            padding: 16px;
        }
        .hw-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .hw-header i {
            font-size: 24px;
            color: #000;
        }
        .hw-header h3 {
            font-size: 16px;
            font-weight: 500;
        }
        .hw-date {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            margin-left: auto;
        }
        .hw-text {
            font-size: 15px;
            background: #f9f9f9;
            padding: 12px;
            margin-top: 8px;
            white-space: pre-wrap;
        }
        .hw-image {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            background: #f4f4f4;
            margin-top: 12px;
            cursor: pointer;
            border: 1px solid #eee;
        }

        /* Админ-панель для ДЗ */
        .admin-hw-panel {
            background: #fafafa;
            border: 1px solid #eaeaea;
            padding: 20px;
            margin-bottom: 24px;
        }
        .admin-hw-panel h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .vpr-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .vpr-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        
        .vpr-info i {
            color: #666;
            font-size: 20px;
        }
        
        .vpr-name {
            font-size: 15px;
            font-weight: 500;
        }
        
        .vpr-date {
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
        }
        
        .vpr-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .vpr-btn {
            background: none;
            border: 1px solid #ddd;
            color: #000;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .vpr-btn:hover {
            background: #f5f5f5;
        }
        
        /* Панель админа для главной (расписание) */
        .admin-panel {
            background: #fafafa;
            border: 1px solid #eaeaea;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .admin-panel h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .admin-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            font-size: 15px;
            margin-bottom: 12px;
            background: white;
            border-radius: 0;
        }
        
        .admin-file {
            width: 100%;
            padding: 12px 0;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px dashed #ccc;
            padding: 12px;
        }
        
        .image-preview-container {
            margin-bottom: 12px;
            display: none;
        }
        
        .image-preview-container.show {
            display: block;
        }
        
        .image-preview {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border: 1px solid #eee;
            cursor: pointer;
        }
        
        .image-size-warning {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        
        .admin-btn {
            background: black;
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 0;
            width: 100%;
            font-weight: 500;
            transition: opacity 0.1s;
        }
        
        .admin-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .admin-btn i {
            margin-right: 8px;
        }
        
        /* Модальное окно редактирования */
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 4000;
        }
        
        .edit-modal.show {
            display: flex;
        }
        
        .edit-modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
        }
        
        .edit-modal-content h4 {
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .edit-modal-content .current-image {
            margin-bottom: 16px;
            border: 1px solid #eee;
            padding: 8px;
        }
        
        .edit-modal-content .current-image img {
            width: 100%;
            max-height: 150px;
            object-fit: contain;
        }
        
        .edit-modal-content .current-image label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        
        .edit-actions button {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .edit-actions button.primary {
            background: black;
            color: white;
            border-color: black;
        }
        
        /* Модальное окно секретного входа */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            width: 320px;
            padding: 24px;
        }
        
        .modal-content h4 {
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            margin-bottom: 12px;
            font-size: 15px;
        }
        
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .modal-actions button.primary {
            background: black;
            color: white;
            border-color: black;
        }
        
        /* ПРОСМОТР ФОТО */
        .photo-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            flex-direction: column;
        }
        
        .photo-viewer.show {
            display: flex;
        }
        
        .photo-toolbar {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }
        
        .photo-toolbar button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            opacity: 0.8;
            transition: opacity 0.1s;
        }
        
        .photo-toolbar button:hover {
            opacity: 1;
        }
        
        .photo-toolbar span {
            font-size: 15px;
            font-weight: 400;
            opacity: 0.9;
        }
        
        .photo-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 20px;
        }
        
        .photo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 15px;
        }
        
        /* Индикатор загрузки */
        .loading-overlay {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            z-index: 100;
            align-items: center;
            gap: 10px;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-overlay i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Подтверждение удаления */
        .confirm-delete {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .confirm-delete.show {
            display: flex;
        }
        
        .confirm-box {
            background: white;
            width: 280px;
            padding: 24px;
            text-align: center;
        }
        
        .confirm-box p {
            margin-bottom: 20px;
            font-size: 15px;
        }
        
        .confirm-actions {
            display: flex;
            gap: 8px;
        }
        
        .confirm-actions button {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .confirm-actions button.delete-confirm {
            background: #ff3b30;
            color: white;
            border-color: #ff3b30;
        }
        
        /* Просмотр PDF */
        .pdf-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        
        .pdf-viewer.show {
            display: flex;
        }
        
        .pdf-toolbar {
            padding: 12px 16px;
            background: #f8f8f8;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .pdf-toolbar button {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 12px;
        }
        
        .pdf-toolbar button:hover {
            background: #eee;
        }
        
        .pdf-toolbar span {
            flex: 1;

        // ========== КОММЕНТАРИИ ==========
        // Функция для конвертации изображения в base64 (для аватарок)
        function imageToBase64(file, maxSize = 100) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > maxSize || height > maxSize) {
                            if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; } 
                            else { width = Math.round(width * maxSize / height); height = maxSize; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
                reader.onerror = reject;
            });
        }

        // ========== ОТСЛЕЖИВАНИЕ ПРОСМОТРОВ ==========
        function setupViewTracking() {
            const posts = document.querySelectorAll('.post');
            Object.keys(viewTimers).forEach(key => { clearTimeout(viewTimers[key]); delete viewTimers[key]; });
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const post = entry.target;
                    const postId = post.id.replace('post-', '');
                    if (entry.isIntersecting) {
                        if (!viewedPosts.has(postId) && !viewTimers[postId]) {
                            viewTimers[postId] = setTimeout(async () => {
                                const rect = post.getBoundingClientRect();
                                if (rect.top < window.innerHeight && rect.bottom > 0 && !viewedPosts.has(postId)) {
                                    try {
                                        const postRef = db.collection('posts').doc(postId);
                                        const doc = await postRef.get();
                                        if (doc.exists) {
                                            const currentViews = doc.data().views || 0;
                                            await postRef.update({ views: currentViews + 1 });
                                            viewedPosts.add(postId);
                                            localStorage.setItem('viewedPosts7a', JSON.stringify([...viewedPosts]));
                                            const viewsElement = post.querySelector('.views-count span');
                                            if (viewsElement) viewsElement.textContent = currentViews + 1;
                                        }
                                    } catch (error) { console.error('Ошибка при обновлении просмотров:', error); }
                                }
                                delete viewTimers[postId];
                            }, 2000);
                        }
                    } else {
                        if (viewTimers[postId]) { clearTimeout(viewTimers[postId]); delete viewTimers[postId]; }
                    }
                });
            }, { threshold: 0.3 });
            posts.forEach(post => observer.observe(post));
        }

                editModal.classList.remove('show'); editImage.value = ''; editPreviewContainer.classList.remove('show');
                if (currentTab === 'main') loadMainTab();
            } catch (error) { alert('Ошибка при сохранении: ' + error.message); } finally {
                saveEdit.disabled = false; saveEdit.innerHTML = 'сохранить'; showLoading(false); editingPostId = null;
            }
        });
        cancelEdit.addEventListener('click', () => { editModal.classList.remove('show'); editImage.value = ''; editPreviewContainer.classList.remove('show'); editingPostId = null; });
        
        // ========== КОНВЕРТАЦИЯ ФОТО В BASE64 (для постов) ==========
        function imageToBase64Post(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxSize = 1200;
                        if (width > maxSize || height > maxSize) {
                            if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; } 
                            else { width = Math.round(width * maxSize / height); height = maxSize; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
                reader.onerror = reject;
            });
        }
        
        window.addEventListener('DOMContentLoaded', () => { loadMainTab(); updateTimer(); });
        
        tabMainBtn.addEventListener('click', () => { currentTab = 'main'; tabMainBtn.classList.add('active'); tabUsefulBtn.classList.remove('active'); loadMainTab(); });
        tabUsefulBtn.addEventListener('click', () => { currentTab = 'useful'; tabUsefulBtn.classList.add('active'); tabMainBtn.classList.remove('active'); loadUsefulTab(); });
        
        // ========== УДАЛЕНИЕ ==========
        function showDeleteConfirm(id, type) { itemToDelete = id; itemType = type; confirmDelete.classList.add('show'); }
        cancelDelete.addEventListener('click', () => { confirmDelete.classList.remove('show'); itemToDelete = null; itemType = null; });
        confirmDeleteBtn.addEventListener('click', () => { if (itemToDelete && itemType) deleteItem(itemToDelete, itemType); confirmDelete.classList.remove('show'); });
        async function deleteItem(id, type) {
            showLoading(true);
            try {
                if (type === 'post') await db.collection('posts').doc(id).delete();
                else if (type === 'hw') await db.collection('homework').doc(id).delete();
                if (currentTab === 'main') loadMainTab(); else loadUsefulTab();
            } catch (error) { alert('Ошибка при удалении: ' + error.message); } finally { showLoading(false); itemToDelete = null; itemType = null; }
        }
        
        // ========== ГЛАВНАЯ ==========
        function loadMainTab() {
            if (isAdmin) {
                let html = `
                    <div class="admin-panel">
                        <h3><i class="fas fa-camera"></i> загрузить расписание</h3>
                        <input type="text" id="postTitle" class="admin-input" placeholder="название (например, РАСПИСАНИЕ НА ПОНЕДЕЛЬНИК)">
                        <div style="border:1px solid #eee; padding:12px; margin-bottom:12px;">
                            <label style="font-size:13px; color:#666; margin-bottom:8px; display:block;"><i class="fas fa-image"></i> фото расписания</label>
                            <input type="file" id="postImage" class="admin-file" accept="image/*">
                            <div class="image-size-warning">фото будет уменьшено для экономии места</div>
                        </div>
                        <div id="imagePreviewContainer" class="image-preview-container"><img id="imagePreview" class="image-preview" src="#" alt="preview" onclick="openPhoto(this.src, 'предпросмотр')"></div>
                        <textarea id="postText" class="admin-input" rows="2" placeholder="комментарий (необязательно)"></textarea>
                        <button class="admin-btn" id="publishPost"><i class="fas fa-cloud-upload-alt"></i> опубликовать</button>
                    </div>
                    <div id="postsList">${showSkeletons('posts')}</div>
                `;
                contentDiv.innerHTML = html;
                document.getElementById('postImage').addEventListener('change', function(e) {
                    if (e.target.files[0]) {
                        const reader = new FileReader();
                        reader.onload = e => { document.getElementById('imagePreview').src = e.target.result; document.getElementById('imagePreviewContainer').classList.add('show'); };
                        reader.readAsDataURL(e.target.files[0]);
                    }
                });
                loadPosts();
                document.getElementById('publishPost').addEventListener('click', publishPost);
            } else {
                contentDiv.innerHTML = `<div id="postsList">${showSkeletons('posts')}</div>`;
                loadPosts();
            }
        }
        
        async function publishPost() {
            const title = document.getElementById('postTitle').value, content = document.getElementById('postText').value, imageFile = document.getElementById('postImage').files[0];
            const publishBtn = document.getElementById('publishPost');
            publishBtn.disabled = true; publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> обработка фото...'; showLoading(true);
            try {
                let imageBase64 = '';
                if (imageFile) imageBase64 = await imageToBase64Post(imageFile);
                await db.collection('posts').add({ 
                    title: title || 'РАСПИСАНИЕ', 
                    content: content || '', 
                    imageBase64, 
                    date: new Date().toISOString(), 
                    likes: [], 
                    likedBy: {}, 
                    views: 0, 
                    pinned: false,
                    comments: [] // Новое поле для комментариев
                });
                document.getElementById('postTitle').value = ''; document.getElementById('postText').value = ''; document.getElementById('postImage').value = ''; document.getElementById('imagePreviewContainer').classList.remove('show');
                loadPosts();
            } catch (error) { alert('Ошибка: ' + error.message); } finally { publishBtn.disabled = false; publishBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> опубликовать'; showLoading(false); }
        }
        
        function loadPosts() {
            const postsList = document.getElementById('postsList');
            if (!postsList) return;
            db.collection('posts').get().then(snapshot => {
                if (snapshot.empty) { postsList.innerHTML = '<div class="empty-state">пока нет расписания</div>'; return; }
                let posts = [];
                snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
                posts.sort((a,b) => { if (a.pinned && !b.pinned) return -1; if (!a.pinned && b.pinned) return 1; return new Date(b.date) - new Date(a.date); });
                let html = '';
                posts.forEach(post => {
                    const likes = post.likes || [], likedBy = post.likedBy || {}, userLiked = likedBy[userId] === true, views = post.views || 0;
                    const commentsCount = (post.comments || []).length;
                    // Генерируем уникальный ID для инпута комментария
                    const commentInputId = `comment-input-${post.id}`;
                    
                    html += `
                        <div class="post ${post.pinned ? 'pinned' : ''}" id="post-${post.id}">
                            <div class="post-header">
                                <div class="post-title-wrapper">
                                    ${post.pinned ? '<i class="fas fa-thumbtack pin-icon"></i>' : ''}
                                    <div class="post-title">${post.title || 'РАСПИСАНИЕ'}</div>
                                </div>
                                ${isAdmin ? `
                                    <div class="post-actions">
                                        <button class="post-action-btn pin ${post.pinned ? 'active' : ''}" onclick="togglePin('${post.id}', this)"><i class="fas fa-thumbtack"></i></button>
                                        <button class="post-action-btn edit" onclick="editPost('${post.id}')"><i class="fas fa-pen"></i></button>
                                        <button class="post-action-btn delete" onclick="deletePost('${post.id}')"><i class="fas fa-trash"></i></button>
                                    </div>
                                ` : ''}
                            </div>
                            ${post.imageBase64 ? `<img src="${post.imageBase64}" class="post-image" alt="расписание" onclick="openPhoto('${post.imageBase64}', '${post.title || 'расписание'}')">` : ''}
                            ${post.content ? `<div class="post-content">${post.content}</div>` : ''}
                            
                            <div class="post-footer">
                                <div class="post-stats">
                                    <button class="like-button ${userLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}', this)">
                                        <i class="fa${userLiked ? 's' : 'r'} fa-heart"></i>
                                        <span class="like-count">${likes.length}</span>
                                    </button>
                                    <div class="views-count">
                                        <i class="far fa-eye"></i>
                                        <span>${views}</span>
                                    </div>
                                    <button class="post-action-btn" onclick="toggleComments('${post.id}')" id="toggle-${post.id}">
                                        <i class="fas fa-comment"></i> ${commentsCount}
                                    </button>
                                </div>
                                <div class="post-date">${formatDate(post.date)}</div>
                            </div>
                            
                            <!-- Комментарии -->
                            <div class="comments-section">
                                <div class="comments-list" id="comments-${post.id}">
                                    <!-- Комментарии загружаются динамически -->
                                </div>
                                
                                <!-- Форма добавления комментария -->
                                <div class="comment-form">
                                    <div style="display:flex; gap:8px; margin-bottom:8px;">
                                        <input type="text" id="comment-name-${post.id}" class="comment-user-name" placeholder="твой никнейм" value="${userData ? userData.name : ''}">
                                        <div class="comment-avatar-upload">
                                            <label for="comment-avatar-${post.id}" class="comment-avatar-btn" id="avatar-btn-${post.id}">
                                                ${userData && userData.avatar ? `<img src="${userData.avatar}">` : '<i class="fas fa-user"></i>'}
                                            </label>
                                            <input type="file" id="comment-avatar-${post.id}" accept="image/*" style="display:none;">
                                        </div>
                                    </div>
                                    <div class="comment-input-wrapper">
                                        <input type="text" id="${commentInputId}" class="comment-input" placeholder="написать комментарий..." onkeypress="if(event.key==='Enter') addComment('${post.id}', '${commentInputId}')">
                                        <button class="comment-submit" onclick="addComment('${post.id}', '${commentInputId}')">
                                            <i class="fas fa-paper-plane"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                postsList.innerHTML = html;
                
                // Добавляем обработчики загрузки аватарок
                posts.forEach(post => {
                    const avatarInput = document.getElementById(`comment-avatar-${post.id}`);
                    if (avatarInput) {
                        avatarInput.addEventListener('change', async function(e) {
                            if (e.target.files[0]) {
                                try {
                                    showLoading(true);
                                    const avatarBase64 = await imageToBase64(e.target.files[0], 100);
                                    // Сохраняем в userData
                                    if (!userData) userData = {};
                                    userData.avatar = avatarBase64;
                                    localStorage.setItem('userData7a', JSON.stringify(userData));
                                    // Обновляем кнопку
                                    const btn = document.getElementById(`avatar-btn-${post.id}`);
                                    btn.innerHTML = `<img src="${avatarBase64}" style="width:100%; height:100%; object-fit:cover;">`;
                                } catch (err) {
                                    console.error(err);
                                } finally {
                                    showLoading(false);
                                }
                            }
                        });
                    }
                    
                    // Загружаем комментарии
                    loadComments(post.id);
                });
                
                setupViewTracking();
            }).catch(error => { console.error('Ошибка:', error); postsList.innerHTML = '<div class="empty-state">ошибка загрузки</div>'; });
        }
        
        window.deletePost = function(postId) { showDeleteConfirm(postId, 'post'); };
        
        // ========== ПОЛЕЗНО (ВПР + ДЗ) ==========
        function loadUsefulTab() {
            if (isAdmin) {
                contentDiv.innerHTML = `
                    <div class="admin-hw-panel">
                        <h3><i class="fas fa-pencil-alt"></i> добавить домашнее задание</h3>
                        <input type="text" id="hwTitle" class="admin-input" placeholder="предмет / название (необязательно)">
                        <div style="border:1px solid #eee; padding:12px; margin-bottom:12px;">
                            <label style="font-size:13px; color:#666;"><i class="fas fa-image"></i> фото задания</label>
                            <input type="file" id="hwImage" class="admin-file" accept="image/*">
                        </div>
                        <div id="hwImagePreviewContainer" class="image-preview-container"><img id="hwImagePreview" class="image-preview" src="#" alt="preview" onclick="openPhoto(this.src, 'предпросмотр дз')"></div>
                        <textarea id="hwText" class="admin-input" rows="3" placeholder="текст домашнего задания (если нет фото)"></textarea>
                        <button class="admin-btn" id="publishHw"><i class="fas fa-save"></i> сохранить задание</button>
                    </div>
                    <div class="section-title"><i class="fas fa-book"></i> Домашнее задание</div>
                    <div id="hwList">${showSkeletons('vpr')}</div>
                    <div class="section-title"><i class="fas fa-file-pdf"></i> ВПР</div>
                    <div id="vprList"></div>
                `;
                document.getElementById('hwImage').addEventListener('change', function(e) {
                    if (e.target.files[0]) {
                        const reader = new FileReader();
                        reader.onload = e => { document.getElementById('hwImagePreview').src = e.target.result; document.getElementById('hwImagePreviewContainer').classList.add('show'); };
                        reader.readAsDataURL(e.target.files[0]);
                    }
                });
                document.getElementById('publishHw').addEventListener('click', publishHomework);
                loadHomework();
                renderVprList();
            } else {
                contentDiv.innerHTML = `
                    <div class="section-title"><i class="fas fa-book"></i> Домашнее задание</div>
                    <div id="hwList">${showSkeletons('vpr')}</div>
                    <div class="section-title"><i class="fas fa-file-pdf"></i> ВПР</div>
                    <div id="vprList"></div>
                `;
                loadHomework();
                renderVprList();
            }
        }
        
        async function publishHomework() {
            const title = document.getElementById('hwTitle').value;
            const text = document.getElementById('hwText').value;
            const imageFile = document.getElementById('hwImage').files[0];
            const btn = document.getElementById('publishHw');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> сохранение...'; showLoading(true);
            try {
                let imageBase64 = '';
                if (imageFile) imageBase64 = await imageToBase64Post(imageFile);
                await db.collection('homework').add({
                    title: title || 'Домашнее задание',
                    text: text || '',
                    imageBase64: imageBase64,
                    date: new Date().toISOString()
                });
                document.getElementById('hwTitle').value = ''; document.getElementById('hwText').value = ''; document.getElementById('hwImage').value = ''; document.getElementById('hwImagePreviewContainer').classList.remove('show');
                loadHomework();
            } catch (error) { alert('Ошибка: ' + error.message); } finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> сохранить задание'; showLoading(false); }
        }
        
        function loadHomework() {
            const hwList = document.getElementById('hwList');
            if (!hwList) return;
            db.collection('homework').orderBy('date', 'desc').get().then(snapshot => {
                if (snapshot.empty) { hwList.innerHTML = '<div class="empty-state">домашнего задания пока нет</div>'; return; }
                let html = '';
                snapshot.forEach(doc => {
                    const hw = doc.data();
                    html += `
                        <div class="hw-item">
                            <div class="hw-header">
                                <i class="fas fa-book-open"></i>
                                <h3>${hw.title || 'Домашнее задание'}</h3>
                                <div class="hw-date">${formatDate(hw.date)}</div>
                                ${isAdmin ? `<button class="post-action-btn delete" onclick="deleteHomework('${doc.id}')" style="margin-left:auto;"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                            ${hw.text ? `<div class="hw-text">${hw.text}</div>` : ''}
                            ${hw.imageBase64 ? `<img src="${hw.imageBase64}" class="hw-image" alt="hw" onclick="openPhoto('${hw.imageBase64}', 'дз')">` : ''}
                        </div>
                    `;
                });
                hwList.innerHTML = html;
            }).catch(err => { hwList.innerHTML = '<div class="empty-state">ошибка загрузки</div>'; });
        }
        
        window.deleteHomework = function(id) { showDeleteConfirm(id, 'hw'); };
        
        function renderVprList() {
            const vprList = document.getElementById('vprList');
            const files = getVprList();
            let html = '';
            files.forEach(vpr => {
                html += `
                    <div class="vpr-item">
                        <div class="vpr-info"><i class="fas fa-file-pdf"></i><div><div class="vpr-name">${vpr.name}</div><div class="vpr-date">${formatDate(vpr.date)}</div><div style="font-size:11px;color:#aaa;">${vpr.fileName}</div></div></div>
                        <div class="vpr-actions"><button class="vpr-btn" onclick="openPdf('${vpr.fileName}', '${vpr.name}')"><i class="fas fa-eye"></i> открыть</button><a href="vpr/${vpr.fileName}" download class="vpr-btn"><i class="fas fa-download"></i></a></div>
                    </div>
                `;
            });
            vprList.innerHTML = html;
        }
        
        // ========== СЕКРЕТНЫЙ ВХОД ==========
        logo.addEventListener('click', () => {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
            if (clickCount >= 10) {
                clickCount = 0; clearTimeout(clickTimer);
                modal.classList.add('active'); document.getElementById('loginName').focus();
            }
        });
        document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('active'));
        document.getElementById('checkLogin').addEventListener('click', () => {
            const name = document.getElementById('loginName').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;
            if (name === 'булат' && pass === '0515') {
                isAdmin = true; modal.classList.remove('active');
                if (currentTab === 'main') loadMainTab(); else loadUsefulTab();
                document.getElementById('loginName').value = ''; document.getElementById('loginPass').value = '';
            } else alert('неверный логин или пароль');
        });
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                modal.classList.remove('active'); confirmDelete.classList.remove('show'); pdfViewer.classList.remove('show'); photoViewer.classList.remove('show'); editModal.classList.remove('show');
                pdfFrame.src = ''; fullscreenPhoto.src = '#';
            }
        });
        
        function formatDate(isoString) {
            if (!isoString) return '';
            return new Date(isoString).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' }).replace(' года', '');
        }
    </script>
